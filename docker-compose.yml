version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: minimercado_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: minimercado_db
    ports:
      - "3307:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql

  api:
    build: ./backend
    container_name: minimercado_api
    volumes:
      - ./backend:/app
    ports:
      - "8080:5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=development
      - DATABASE_URL=mysql+mysqlconnector://root:root@db/minimercado_db
    depends_on:
      - db